<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Snapie</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .hero { padding: 120px 0 80px; text-align: center; }
    .hero h1 {
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 900;
      margin-bottom: 16px;
    }
    .hero p {
      font-size: 0.95rem;
      color: var(--text-2);
      max-width: 460px;
      margin: 0 auto 40px;
      line-height: 1.7;
    }
    .auth-card { max-width: 380px; margin: 0 auto; }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.88rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .google-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--border-lit);
      transform: translateY(-1px);
    }
    .google-btn svg { flex-shrink: 0; }
    .plugin-tag {
      display: inline-block;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
      margin-bottom: 18px;
    }
    #status-area { min-height: 0; }
    .spinner-row { text-align: center; padding: 20px 0; color: var(--text-2); }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="wordmark">
        <span class="dot"></span>
        SNAPIE AUTH
      </a>
    </div>
  </nav>

  <div class="hero">
    <div class="container">
      <div class="auth-card card card-glow">
        <div id="plugin-tag" class="plugin-tag" style="display:none"></div>
        <h1>Activate your license</h1>
        <p>Sign in to link this plugin to your Hive account. New here? We'll create one for you automatically.</p>

        <div id="status-area"></div>

        <div id="auth-main" style="display:none">
          <button class="google-btn" id="google-btn">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M17.64 9.2a10.3 10.3 0 00-.164-1.841H9v3.48h4.844a4.14 4.14 0 01-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.614z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
              <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Continue with Google
          </button>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div>SNAPIE AUTH · <a href="/docs.html">API Docs</a></div>
  </footer>

  <script type="module">
    import { getPublicConfig, showAlert, checkAuth, completeLicenseActivation } from '/auth.js'

    const PENDING_KEY = 'snapie_license_pending'

    function isAllowedRedirect(redirectUrl, allowedHosts) {
      let url
      try { url = new URL(redirectUrl) } catch { return false }
      if (url.protocol !== 'https:') return false
      return allowedHosts.includes(url.hostname)
    }

    async function init() {
      const statusArea = document.getElementById('status-area')
      const params = new URLSearchParams(window.location.search)
      const redirect = params.get('redirect')
      const plugin = params.get('plugin')
      const machine = params.get('machine')

      if (!redirect || !plugin || !machine) {
        showAlert(statusArea, 'This sign-in link is missing required parameters.', 'danger')
        return
      }
      if (!/^[a-z0-9_]{1,64}$/i.test(plugin)) {
        showAlert(statusArea, 'Invalid plugin identifier.', 'danger')
        return
      }
      if (!/^[0-9a-f]{16}$/i.test(machine)) {
        showAlert(statusArea, 'Invalid machine identifier.', 'danger')
        return
      }

      const cfg = await getPublicConfig().catch(() => ({}))
      const allowedHosts = cfg.licenseRedirectHosts || []
      if (!isAllowedRedirect(redirect, allowedHosts)) {
        showAlert(statusArea, 'This sign-in link points to an untrusted destination.', 'danger')
        return
      }

      const pluginTag = document.getElementById('plugin-tag')
      pluginTag.textContent = plugin
      pluginTag.style.display = 'inline-block'

      sessionStorage.setItem(PENDING_KEY, JSON.stringify({ redirect, plugin, machine }))

      // Already signed in (existing snapieauth_session cookie) — skip the
      // button entirely and complete the activation right away.
      const me = await checkAuth()
      if (me?.user) {
        statusArea.innerHTML = ''
        const row = document.createElement('div')
        row.className = 'spinner-row'
        row.textContent = `Signed in as ${me.user.name || 'you'} — activating...`
        statusArea.appendChild(row)
        await completeLicenseActivation({ redirect, plugin, machine })
        return
      }

      if (!cfg.googleClientId) {
        showAlert(statusArea, 'Google sign-in is not configured.', 'danger')
        return
      }

      document.getElementById('auth-main').style.display = 'block'
      document.getElementById('google-btn').addEventListener('click', () => {
        const oauthParams = new URLSearchParams({
          client_id: cfg.googleClientId,
          redirect_uri: window.location.origin + '/login-callback.html',
          response_type: 'token id_token',
          scope: 'openid email profile',
          nonce: crypto.randomUUID()
        })
        window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${oauthParams}`
      })
    }

    init()
  </script>
</body>
</html>
